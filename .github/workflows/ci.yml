name: CI Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 检查代码格式（可选）
        run: |
          pip install black isort
          black --check . || echo "⚠️ 代码格式检查失败（仅警告）"
          isort --check . || echo "⚠️ 导入排序检查失败（仅警告）"
        continue-on-error: true

      - name: 运行快速测试
        env:
          # 测试环境的 API keys（使用测试账号或 mock）
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY_TEST || secrets.TAVILY_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY_TEST || secrets.FRED_API_KEY }}
        run: |
          python run_tests.py --quick

      - name: 运行完整测试套件
        if: github.event_name == 'pull_request'
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY_TEST || secrets.TAVILY_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY_TEST || secrets.FRED_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
        run: |
          python run_tests.py

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 安装 linting 工具
        run: |
          pip install ruff mypy

      - name: Ruff 检查
        run: |
          ruff check . || echo "⚠️ Ruff 检查发现问题"
        continue-on-error: true

      - name: 类型检查（MyPy）
        run: |
          mypy . --ignore-missing-imports || echo "⚠️ 类型检查发现问题"
        continue-on-error: true
