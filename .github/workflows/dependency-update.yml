name: Dependency Update

on:
  schedule:
    # 每周日凌晨运行
    - cron: "0 10 * * 0"  # UTC 10:00 = PST 02:00 / PDT 03:00
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-dependencies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 检查可更新的依赖
        id: check_updates
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip list --outdated --format=json > outdated.json
          
          if [ -s outdated.json ] && [ "$(cat outdated.json)" != "[]" ]; then
            echo "has_updates=true" >> $GITHUB_OUTPUT
            echo "### 可更新的依赖包：" >> $GITHUB_STEP_SUMMARY
            cat outdated.json | python -m json.tool >> $GITHUB_STEP_SUMMARY
          else
            echo "has_updates=false" >> $GITHUB_OUTPUT
            echo "✅ 所有依赖已是最新版本" >> $GITHUB_STEP_SUMMARY
          fi

      - name: 生成更新报告
        if: steps.check_updates.outputs.has_updates == 'true'
        run: |
          python - <<'EOF'
          import json
          import sys
          from datetime import datetime
          
          with open('outdated.json', 'r') as f:
              outdated = json.load(f)
          
          if not outdated:
              sys.exit(0)
          
          report = []
          report.append("## 🔄 依赖更新提醒\n")
          report.append("以下依赖包有新版本可用：\n")
          report.append("| 包名 | 当前版本 | 最新版本 |")
          report.append("|------|---------|---------|")
          
          for pkg in outdated:
              report.append(f"| {pkg['name']} | {pkg['version']} | {pkg['latest_version']} |")
          
          report.append("\n---")
          report.append("请检查更新日志并决定是否更新。")
          
          with open('update_report.md', 'w') as f:
              f.write('\n'.join(report))
          EOF

      - name: 创建 Issue
        if: steps.check_updates.outputs.has_updates == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "[自动] 依赖更新检测 - $(date +%Y-%m-%d)" \
            --body-file update_report.md \
            --label dependencies,automated
