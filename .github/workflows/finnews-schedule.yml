name: finnews-schedule

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron uses UTC only.
    # We schedule both PST and PDT equivalents and gate by America/Los_Angeles.
    - cron: "0 15 * * *" # 08:00 PDT
    - cron: "0 16 * * *" # 08:00 PST
    - cron: "0 3 * * *"  # 20:00 PDT
    - cron: "0 4 * * *"  # 20:00 PST

permissions:
  contents: read

concurrency:
  group: finnews-schedule
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      TZ: America/Los_Angeles

      # Required API keys
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

      # Optional API keys
      ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}

      # Email digest (OpenRouter -> Gmail SMTP)
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
      OPENROUTER_HTTP_REFERER: ${{ secrets.OPENROUTER_HTTP_REFERER }}
      OPENROUTER_X_TITLE: ${{ secrets.OPENROUTER_X_TITLE }}

      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_USE_TLS: ${{ secrets.SMTP_USE_TLS }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}

      # Backoff / jitter controls
      FINNEWS_JITTER_MAX_SECONDS: "600"

    steps:
      - uses: actions/checkout@v4

      - name: Gate schedule to 08:00/20:00 PT
        id: gate
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          hour=$(date +%H)
          minute=$(date +%M)

          if [ "$minute" != "00" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$hour" = "08" ] || [ "$hour" = "20" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v5
        if: steps.gate.outputs.should_run == 'true'
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        if: steps.gate.outputs.should_run == 'true'
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Jitter (avoid busy window)
        if: steps.gate.outputs.should_run == 'true'
        shell: bash
        run: |
          max=${FINNEWS_JITTER_MAX_SECONDS:-600}
          python - <<'PY'
          import os
          import random
          import time

          max_seconds = int(os.environ.get("FINNEWS_JITTER_MAX_SECONDS", "600"))
          sleep_seconds = random.randint(0, max_seconds)
          print(f"Sleeping {sleep_seconds}s jitter")
          time.sleep(sleep_seconds)
          PY

      - name: Run pipeline (with retry/backoff)
        if: steps.gate.outputs.should_run == 'true'
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          import time

          max_attempts = 3
          for attempt in range(1, max_attempts + 1):
            print(f"Attempt {attempt}/{max_attempts}")
            p = subprocess.run(["python", "main.py"], check=False)
            if p.returncode == 0:
              raise SystemExit(0)
            if attempt < max_attempts:
              wait = 2 ** attempt
              print(f"Run failed (code={p.returncode}); backoff {wait}s")
              time.sleep(wait)
          raise SystemExit(p.returncode)
          PY

      - name: Upload outputs
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: finnews-outputs-${{ github.run_id }}
          path: |
            outputs/processed/**
            outputs/raw/**
            outputs/logs/**
          if-no-files-found: warn
          retention-days: 14
