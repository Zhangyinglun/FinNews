name: finnews-schedule

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron uses UTC only.
    # We schedule both PST and PDT equivalents and gate by America/Los_Angeles.
    - cron: "0 15 * * *" # 08:00 PDT
    - cron: "0 16 * * *" # 08:00 PST
    - cron: "0 3 * * *"  # 20:00 PDT
    - cron: "0 4 * * *"  # 20:00 PST

permissions:
  contents: read

concurrency:
  group: finnews-schedule
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      TZ: America/Los_Angeles

      # Required API keys
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

      # Optional API keys
      ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}

      # Email digest (OpenRouter -> Gmail SMTP)
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL || 'google/gemini-3-pro-preview' }}
      OPENROUTER_HTTP_REFERER: ${{ secrets.OPENROUTER_HTTP_REFERER || '' }}
      OPENROUTER_X_TITLE: ${{ secrets.OPENROUTER_X_TITLE || '' }}

      SMTP_HOST: ${{ secrets.SMTP_HOST || 'smtp.gmail.com' }}
      SMTP_PORT: ${{ secrets.SMTP_PORT || '587' }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_USE_TLS: ${{ secrets.SMTP_USE_TLS || 'true' }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}

      # Backoff / jitter controls
      FINNEWS_JITTER_MAX_SECONDS: "600"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Jitter (avoid busy window)
        shell: bash
        run: |
          max=${FINNEWS_JITTER_MAX_SECONDS:-600}
          python - <<'PY'
          import os
          import random
          import time

          max_seconds = int(os.environ.get("FINNEWS_JITTER_MAX_SECONDS", "600"))
          sleep_seconds = random.randint(0, max_seconds)
          print(f"Sleeping {sleep_seconds}s jitter")
          time.sleep(sleep_seconds)
          PY

      - name: Verify configuration
        shell: bash
        run: |
          echo "🔍 验证配置..."
          python - <<'PY'
          import os
          import sys
          
          required_keys = [
              "TAVILY_API_KEY",
              "FRED_API_KEY", 
              "OPENROUTER_API_KEY",
              "SMTP_USERNAME",
              "SMTP_PASSWORD",
              "EMAIL_FROM",
              "EMAIL_TO",
          ]
          
          optional_keys = [
              "SMTP_HOST",
              "SMTP_PORT",
              "SMTP_USE_TLS",
              "OPENROUTER_MODEL",
          ]
          
          missing = []
          for key in required_keys:
              value = os.environ.get(key, "")
              if not value or value == "":
                  missing.append(key)
              else:
                  # 打印前4个字符用于验证
                  print(f"✅ {key}: {value[:4]}***")
          
          # 显示可选配置
          print("\n📋 可选配置:")
          for key in optional_keys:
              value = os.environ.get(key, "")
              if value:
                  if key in ["SMTP_PORT", "SMTP_USE_TLS"]:
                      print(f"  {key}: {value}")
                  else:
                      print(f"  {key}: {value[:20]}...")
              else:
                  print(f"  {key}: (使用默认值)")
          
          if missing:
              print(f"\n❌ 缺少必需的环境变量: {', '.join(missing)}")
              sys.exit(1)
          else:
              print("\n✅ 所有必需的配置已设置")
          PY

      - name: Run pipeline (with retry/backoff)
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          import time
          import sys

          max_attempts = 3
          for attempt in range(1, max_attempts + 1):
            print(f"🔄 执行尝试 {attempt}/{max_attempts}...")
            p = subprocess.run(["python", "main.py"], check=False, capture_output=False)
            
            if p.returncode == 0:
              print(f"✅ 执行成功!")
              raise SystemExit(0)
            
            print(f"❌ 执行失败 (退出码={p.returncode})")
            
            if attempt < max_attempts:
              wait = 2 ** attempt
              print(f"⏳ 等待 {wait} 秒后重试...")
              time.sleep(wait)
            else:
              print(f"❌ 达到最大重试次数，执行失败")
          
          raise SystemExit(p.returncode)
          PY

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: finnews-outputs-${{ github.run_id }}
          path: |
            outputs/processed/**
            outputs/raw/**
            outputs/logs/**
          if-no-files-found: warn
          retention-days: 14
