name: finnews-schedule

# ⏰ 调度说明
# 
# 使用固定 UTC 时间，洛杉矶本地时间会随夏令时自动调整:
# - 冬季 (PST, UTC-8): 16:00 UTC = 08:00 PST / 04:00 UTC = 20:00 PST
# - 夏季 (PDT, UTC-7): 16:00 UTC = 09:00 PDT / 04:00 UTC = 21:00 PDT
#
# 无需手动调整 cron 配置

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron uses UTC only.
    # Local LA time adjusts automatically with DST.
    - cron: "0 16 * * *" # ~08:00-09:00 LA time
    - cron: "0 4 * * *"  # ~20:00-21:00 LA time

permissions:
  contents: write

concurrency:
  group: finnews-schedule
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      TZ: America/Los_Angeles

      # Required API keys
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

      # Optional API keys
      ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}

      # Email digest (OpenRouter -> Gmail SMTP)
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL || 'deepseek/deepseek-v3.2' }}
      OPENROUTER_HTTP_REFERER: ${{ secrets.OPENROUTER_HTTP_REFERER || '' }}
      OPENROUTER_X_TITLE: ${{ secrets.OPENROUTER_X_TITLE || '' }}

      SMTP_HOST: ${{ secrets.SMTP_HOST || 'smtp.gmail.com' }}
      SMTP_PORT: ${{ secrets.SMTP_PORT || '587' }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_USE_TLS: ${{ secrets.SMTP_USE_TLS || 'true' }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}

      # Backoff / jitter controls
      FINNEWS_JITTER_MAX_SECONDS: "600"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Jitter (avoid busy window)
        shell: bash
        run: |
          max=${FINNEWS_JITTER_MAX_SECONDS:-600}
          python - <<'PY'
          import os
          import random
          import time

          max_seconds = int(os.environ.get("FINNEWS_JITTER_MAX_SECONDS", "600"))
          sleep_seconds = random.randint(0, max_seconds)
          print(f"Sleeping {sleep_seconds}s jitter")
          time.sleep(sleep_seconds)
          PY

      - name: Verify configuration
        shell: bash
        run: |
          echo "🔍 验证配置..."
          python - <<'PY'
          import os
          import sys
          
          required_keys = [
              "TAVILY_API_KEY",
              "FRED_API_KEY", 
              "OPENROUTER_API_KEY",
              "SMTP_USERNAME",
              "SMTP_PASSWORD",
              "EMAIL_FROM",
              "EMAIL_TO",
          ]
          
          optional_keys = [
              "SMTP_HOST",
              "SMTP_PORT",
              "SMTP_USE_TLS",
              "OPENROUTER_MODEL",
          ]
          
          missing = []
          for key in required_keys:
              value = os.environ.get(key, "")
              if not value or value == "":
                  missing.append(key)
              else:
                  # 打印前4个字符用于验证
                  print(f"✅ {key}: {value[:4]}***")
          
          # 显示可选配置
          print("\n📋 可选配置:")
          for key in optional_keys:
              value = os.environ.get(key, "")
              if value:
                  if key in ["SMTP_PORT", "SMTP_USE_TLS"]:
                      print(f"  {key}: {value}")
                  else:
                      print(f"  {key}: {value[:20]}...")
              else:
                  print(f"  {key}: (使用默认值)")
          
          if missing:
              print(f"\n❌ 缺少必需的环境变量: {', '.join(missing)}")
              sys.exit(1)
          else:
              print("\n✅ 所有必需的配置已设置")
          PY

      - name: Run pipeline (with retry/backoff)
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          import time
          import sys

          max_attempts = 3
          for attempt in range(1, max_attempts + 1):
            print(f"🔄 执行尝试 {attempt}/{max_attempts}...")
            p = subprocess.run(["python", "main.py"], check=False, capture_output=False)
            
            if p.returncode == 0:
              print(f"✅ 执行成功!")
              raise SystemExit(0)
            
            print(f"❌ 执行失败 (退出码={p.returncode})")
            
            if attempt < max_attempts:
              wait = 2 ** attempt
              print(f"⏳ 等待 {wait} 秒后重试...")
              time.sleep(wait)
            else:
              print(f"❌ 达到最大重试次数，执行失败")
          
          raise SystemExit(p.returncode)
          PY

      - name: Commit COMEX history
        if: success()
        shell: bash
        run: |
          # 配置 Git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 检查 COMEX 历史文件是否有变化
          if git diff --quiet outputs/comex_history.json 2>/dev/null; then
            echo "📊 COMEX历史数据无变化，跳过提交"
          else
            echo "📊 检测到COMEX历史数据变化，准备提交..."
            git add outputs/comex_history.json
            git commit -m "自动更新COMEX历史数据 $(date +'%Y-%m-%d')"
            git push
            echo "✅ COMEX历史数据已更新并推送"
          fi

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: finnews-outputs-${{ github.run_id }}
          path: |
            outputs/processed/**
            outputs/raw/**
            outputs/logs/**
            outputs/comex_history.json
            outputs/digest_preview_*.html
          if-no-files-found: warn
          retention-days: 14

      - name: Generate run summary
        if: always()
        shell: bash
        run: |
          echo "# 📧 FinNews 运行摘要" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**运行时间**: $(date +'%Y-%m-%d %H:%M:%S %Z')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # 检查输出文件
          if [ -d outputs ]; then
            echo "## 📦 生成的文件" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            # 日志文件
            if [ -d outputs/logs ]; then
              LOG_COUNT=$(find outputs/logs -name "*.log" | wc -l)
              echo "- 📝 日志文件: ${LOG_COUNT}个" >> $GITHUB_STEP_SUMMARY
              find outputs/logs -name "*.log" -exec ls -lh {} \; | awk '{print "  - " $9 " (" $5 ")"}' >> $GITHUB_STEP_SUMMARY || true
            fi
            
            # 处理后数据
            if [ -d outputs/processed ]; then
              PROC_COUNT=$(find outputs/processed -name "*.md" | wc -l)
              echo "- 📊 处理数据: ${PROC_COUNT}个" >> $GITHUB_STEP_SUMMARY
            fi
            
            # 原始数据
            if [ -d outputs/raw ]; then
              RAW_COUNT=$(find outputs/raw -name "*.json" | wc -l)
              echo "- 💾 原始数据: ${RAW_COUNT}个" >> $GITHUB_STEP_SUMMARY
            fi
            
            # COMEX历史
            if [ -f outputs/comex_history.json ]; then
              COMEX_SIZE=$(du -h outputs/comex_history.json | awk '{print $1}')
              echo "- 🏦 COMEX历史: ${COMEX_SIZE}" >> $GITHUB_STEP_SUMMARY
            fi
            
            # 邮件预览
            HTML_COUNT=$(find outputs -name "digest_preview_*.html" 2>/dev/null | wc -l)
            if [ ${HTML_COUNT} -gt 0 ]; then
              echo "- 📧 邮件预览: ${HTML_COUNT}个" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "⚠️ outputs目录不存在" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "💡 提示: 点击下方'Artifacts'下载完整输出文件" >> $GITHUB_STEP_SUMMARY

